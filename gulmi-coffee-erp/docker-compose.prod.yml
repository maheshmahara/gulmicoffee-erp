version: '3.9'

# ============================================================
# Gulmi Coffee ERP — Production Override with SSL
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Set DOMAIN in .env  (e.g. erp.gulmicoffee.com.np)
#   2. Point DNS A record to your server IP
#   3. Run certbot once to get certificates:
#      docker run --rm -p 80:80 \
#        -v ./ssl/certbot/conf:/etc/letsencrypt \
#        -v ./ssl/certbot/www:/var/www/certbot \
#        certbot/certbot certonly --standalone \
#        -d ${DOMAIN} --email admin@gulmicoffee.com.np \
#        --agree-tos --non-interactive
# ============================================================

services:

  gulmi-erp:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-ssl.conf:/etc/nginx/conf.d/gulmi-erp.conf:ro
      - ./ssl/certbot/conf:/etc/letsencrypt:ro
      - ./ssl/certbot/www:/var/www/certbot:ro
      - ./src/index.html:/usr/share/nginx/html/index.html:ro
      - gulmi_logs:/var/log/nginx

  # Auto-renew SSL certificates (runs every 12h)
  certbot:
    image: certbot/certbot
    container_name: gulmi-certbot
    restart: unless-stopped
    volumes:
      - ./ssl/certbot/conf:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  gulmi_logs:
