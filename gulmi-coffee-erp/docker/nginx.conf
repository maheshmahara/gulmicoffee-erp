server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ERP main application
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Customer portal (same app, separate route)
    location /portal {
        try_files /portal.html =404;
        add_header Cache-Control "no-cache";
    }

    # Health check endpoint
    location /health {
        try_files /health.html =200;
        access_log off;
        add_header Content-Type text/plain;
    }

    # Static asset caching (fonts, icons loaded from CDN are cached by browser)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/gulmi-erp.access.log;
    error_log  /var/log/nginx/gulmi-erp.error.log warn;
}
