upstream odoo {
    server odoo:8069;
}

upstream frontend {
    server gulmi-erp:80;
}

# ── Rate limiting ──────────────────────────────
limit_req_zone $binary_remote_addr zone=odoo:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    proxy_read_timeout     720s;
    proxy_connect_timeout  720s;
    proxy_send_timeout     720s;
    proxy_set_header       X-Forwarded-Host   $http_host;
    proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto  $scheme;
    proxy_set_header       X-Real-IP          $remote_addr;
    proxy_set_header       Host               $host;

    # ── Health check ──────────────────────────
    location /health {
        return 200 'Gulmi Coffee ERP Stack: OK\n';
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Odoo Web Client (/odoo) ───────────────
    location /odoo {
        limit_req zone=odoo burst=20 nodelay;
        rewrite ^/odoo(.*)$ $1 break;
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # ── Odoo Web Assets ───────────────────────
    location /web {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    location /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering   on;
        proxy_pass        http://odoo;
    }

    location /longpolling {
        proxy_pass http://odoo;
    }

    # ── Odoo API endpoints ────────────────────
    location /api/ {
        proxy_pass http://odoo;
    }
    location /jsonrpc {
        proxy_pass http://odoo;
    }
    location /xmlrpc/ {
        proxy_pass http://odoo;
    }

    # ── Gulmi Custom ERP Dashboard (root) ────
    location / {
        proxy_pass http://frontend;
        proxy_redirect off;
        add_header Cache-Control "no-cache";
    }

    # ── Gzip ──────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json;

    # ── Security headers ──────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/gulmi.access.log;
    error_log  /var/log/nginx/gulmi.error.log warn;
}
