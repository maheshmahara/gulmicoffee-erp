[options]
; ── Database ──────────────────────────────────
db_host = db
db_port = 5432
db_user = gulmi
db_password = GulmiCoffee@2025!
db_name = gulmi_erp

; ── Addons ────────────────────────────────────
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; ── Admin ─────────────────────────────────────
admin_passwd = GulmiAdmin@2025!

; ── Server ────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
workers = 2
max_cron_threads = 1

; ── Logging ───────────────────────────────────
